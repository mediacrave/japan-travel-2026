        // --- RENDER LOGIC ---

        // Toggle Accordion
        function toggleAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            } else {
                // Close others (Optional, but keeps it clean)
                document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('open'));
                document.querySelectorAll('.fa-chevron-up').forEach(el => {
                    el.classList.remove('fa-chevron-up');
                    el.classList.add('fa-chevron-down');
                });
                
                // Open clicked
                content.classList.add('open');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            }
        }

        // Toggle Tips
        function toggleTips(id) {
            const tipsContent = document.getElementById(`tips-content-${id}`);
            const tipsIcon = document.getElementById(`tips-icon-${id}`);
            
            if(tipsContent.classList.contains('hidden')) {
                tipsContent.classList.remove('hidden');
                tipsIcon.classList.remove('fa-chevron-down');
                tipsIcon.classList.add('fa-chevron-up');
            } else {
                tipsContent.classList.add('hidden');
                tipsIcon.classList.remove('fa-chevron-up');
                tipsIcon.classList.add('fa-chevron-down');
            }
        }

        // Switch Tab
        function switchTab(tabId) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            });
            
            // Reset all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors whitespace-nowrap flex-1 justify-center bg-white text-slate-600 border border-slate-200 hover:bg-slate-50";
            });

            // Show selected content
            const activeContent = document.getElementById(`tab-${tabId}`);
            activeContent.classList.remove('hidden');
            // Small delay to re-trigger animation
            setTimeout(() => activeContent.classList.add('fade-in'), 10);

            // Highlight selected button
            const activeBtn = document.getElementById(`btn-${tabId}`);
            activeBtn.className = "tab-btn flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors whitespace-nowrap flex-1 justify-center bg-slate-800 text-white shadow-md";
        }

        // Initialize App content
        function initApp() {
            // Render Itinerary
            const itinContainer = document.getElementById('itinerary-container');
            itinContainer.innerHTML = itinerary.map((dest, index) => {
                const isFirst = false; // Start with all sections closed
                
                let detailsHTML = '';
                if(dest.accommodation) detailsHTML += `<div class="flex items-start gap-2 text-sm text-slate-700 bg-white p-3 rounded-lg border border-slate-100"><i class="fa-solid fa-bed text-red-500 mt-1 shrink-0"></i><div><span class="font-semibold block mb-0.5">Stay</span>${dest.accommodation}</div></div>`;
                if(dest.travel) detailsHTML += `<div class="flex items-start gap-2 text-sm text-slate-700 bg-white p-3 rounded-lg border border-slate-100"><i class="fa-solid fa-train text-red-500 mt-1 shrink-0"></i><div><span class="font-semibold block mb-0.5">Travel</span>${dest.travel}</div></div>`;
                if(dest.notes) detailsHTML += `<div class="flex items-start gap-2 text-sm text-slate-700 bg-white p-3 rounded-lg border border-slate-100"><i class="fa-solid fa-shield-halved text-amber-500 mt-1 shrink-0"></i><div><span class="font-semibold block mb-0.5">Important</span>${dest.notes}</div></div>`;

                let daysHTML = '';
                if(dest.days.length > 0) {
                    daysHTML = `
                        <div class="mt-6">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 ml-2">Daily Itinerary</h4>
                            <div class="space-y-4 relative before:absolute before:inset-0 before:ml-[11px] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 before:to-transparent">
                                ${dest.days.map(day => {
                                    const isSilverWeek = /Sept (19|20|21|22|23)/.test(day.date);
                                    const dateColorClass = isSilverWeek ? 'text-red-600' : 'text-slate-800';
                                    const badgeHTML = isSilverWeek ? `<span class="ml-2 text-[9px] font-bold uppercase bg-red-100 text-red-600 px-1.5 py-0.5 rounded-sm">Silver Week</span>` : '';
                                    return `
                                    <div class="relative flex items-start gap-4">
                                        <div class="absolute left-0 w-6 h-6 rounded-full bg-white border-2 border-red-500 flex items-center justify-center mt-0.5 z-10 shadow-sm">
                                            <div class="w-1.5 h-1.5 bg-red-500 rounded-full"></div>
                                        </div>
                                        <div class="ml-10 bg-white p-3 rounded-xl border border-slate-100 shadow-sm w-full">
                                            <span class="font-bold ${dateColorClass} text-sm flex items-center mb-1">
                                                ${day.date} ${badgeHTML}
                                            </span>
                                            <p class="text-slate-600 text-sm leading-relaxed">${day.desc}</p>
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    `;
                }

                let tipsHTML = '';
                if(dest.locationTips) {
                    tipsHTML = `
                        <div class="mt-6 border border-slate-200 bg-slate-50/80 rounded-xl overflow-hidden shadow-sm">
                            <button onclick="toggleTips('${dest.id}')" class="flex items-center justify-between w-full text-left font-bold text-slate-700 hover:bg-slate-100 transition-colors p-3">
                                <span class="flex items-center gap-2 text-sm"><i class="fa-solid fa-lightbulb text-amber-500"></i> Local AI Tips for ${dest.title}</span>
                                <i id="tips-icon-${dest.id}" class="fa-solid fa-chevron-down text-slate-400"></i>
                            </button>
                            <div id="tips-content-${dest.id}" class="hidden p-4 pt-2 space-y-4 text-sm text-slate-600 animate-in fade-in slide-in-from-top-2 duration-300">
                                <div>
                                    <h5 class="font-bold text-orange-600 mb-1 flex items-center gap-1.5"><i class="fa-solid fa-utensils"></i> Must-Try Food</h5>
                                    <ul class="list-disc pl-5 space-y-1">${dest.locationTips.food.map(f => `<li>${f}</li>`).join('')}</ul>
                                </div>
                                <div>
                                    <h5 class="font-bold text-blue-600 mb-1 flex items-center gap-1.5"><i class="fa-solid fa-language"></i> Useful Phrases</h5>
                                    <ul class="list-disc pl-5 space-y-1">${dest.locationTips.phrases.map(p => `<li>${p}</li>`).join('')}</ul>
                                </div>
                                <div>
                                    <h5 class="font-bold text-emerald-600 mb-1 flex items-center gap-1.5"><i class="fa-solid fa-leaf"></i> Cultural Notes</h5>
                                    <ul class="list-disc pl-5 space-y-1">${dest.locationTips.culture.map(c => `<li>${c}</li>`).join('')}</ul>
                                </div>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden transition-all duration-300">
                        <div class="p-4 cursor-pointer hover:bg-slate-50 flex items-center justify-between" onclick="toggleAccordion('${dest.id}')">
                            <div class="flex items-center gap-4">
                                <div class="bg-red-50 w-12 h-12 rounded-full text-red-600 shrink-0 flex items-center justify-center text-xl">
                                    <i class="fa-solid ${dest.icon}"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-lg text-slate-800 leading-tight">${dest.title}</h3>
                                    <p class="text-sm text-slate-500 mt-1">${dest.dates} • ${dest.daysCount}</p>
                                </div>
                            </div>
                            <div class="text-slate-400 px-2">
                                <i id="icon-${dest.id}" class="fa-solid ${isFirst ? 'fa-chevron-up' : 'fa-chevron-down'}"></i>
                            </div>
                        </div>
                        <div id="content-${dest.id}" class="accordion-content ${isFirst ? 'open' : ''}">
                            <div class="p-4 pt-0 border-t border-slate-100 bg-slate-50/50">
                                <div class="my-4 space-y-3">${detailsHTML}</div>
                                ${daysHTML}
                                ${tipsHTML}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Render Bookings
            const bookingsContainer = document.getElementById('bookings-container');
            bookingsContainer.innerHTML = bookingDeadlines.map(block => `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 text-lg border-b border-slate-100 pb-3 mb-4">${block.period}</h3>
                    ${block.desc ? `<p class="text-sm text-slate-500 italic mb-4">${block.desc}</p>` : ''}
                    <div class="space-y-4">
                        ${block.items.map((item, i) => `
                            <div class="flex gap-4">
                                <div class="flex flex-col items-center mt-1.5">
                                    <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                                    ${i !== block.items.length - 1 ? `<div class="w-px h-full bg-slate-200 my-1"></div>` : ''}
                                </div>
                                <div class="pb-2">
                                    <div class="font-semibold text-slate-800">${item.title}</div>
                                    <div class="text-xs font-bold text-red-600 my-1">${item.date}</div>
                                    <div class="text-sm text-slate-600 mt-1">${item.desc}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Render Notes
            const boldWords = ['Silver Week', 'Digital Suica', 'Pasmo', 'Klook', 'SmartEX', 'Ecbo Cloak', 'Japan Rail Pass', 'Nikko Pass', 'Hakone Freepass', 'IDP', 'Tipping'];
            const notesContainer = document.getElementById('notes-container');
            notesContainer.innerHTML = tripNotes.map(note => {
                let formattedNote = note;
                boldWords.forEach(word => {
                    if(formattedNote.includes(word)) {
                        formattedNote = formattedNote.replace(word, `<strong class="text-slate-900 font-bold">${word}</strong>`);
                    }
                });
                return `
                    <li class="flex gap-3 text-sm text-slate-600">
                        <div class="mt-1.5 shrink-0"><div class="w-1.5 h-1.5 bg-red-400 rounded-full"></div></div>
                        <span class="leading-relaxed">${formattedNote}</span>
                    </li>
                `;
            }).join('');
        }

        // Run initialization
        initApp();
    </script>
</body>
